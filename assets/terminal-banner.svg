<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="IAteNoodles terminal banner">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b1020"/>
      <stop offset="50%" stop-color="#151a31"/>
      <stop offset="100%" stop-color="#1f2443"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58A6FF"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <style>
      .mono { font-family: "Fira Code", "JetBrains Mono", Consolas, monospace; }
      .head { font: 700 50px "Fira Code", "JetBrains Mono", Consolas, monospace; }
      .sub { font: 600 20px "Fira Code", "JetBrains Mono", Consolas, monospace; }
      .cmd { font: 500 18px "Fira Code", "JetBrains Mono", Consolas, monospace; }
    </style>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)" rx="20"/>
  <rect x="20" y="20" width="1160" height="280" fill="#090d1a" stroke="#2a3358" stroke-width="2" rx="14"/>
  <rect x="20" y="20" width="1160" height="280" fill="none" rx="14" stroke="url(#glow)" opacity="0.15">
    <animate attributeName="opacity" values="0.1;0.25;0.1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <circle cx="52" cy="44" r="6" fill="#ff5f56"/>
  <circle cx="74" cy="44" r="6" fill="#ffbd2e"/>
  <circle cx="96" cy="44" r="6" fill="#27c93f"/>
  <text x="130" y="50" class="mono" font-size="14" fill="#8b95c9">user@iatenoodles:~</text>

  <rect x="52" y="74" width="540" height="2" fill="url(#glow)" opacity="0.75"/>
  <rect x="52" y="74" width="540" height="10" fill="url(#glow)" opacity="0.2" filter="url(#soft)"/>

  <text x="52" y="128" class="head" fill="#d6e7ff">IAteNoodles</text>
  <text x="52" y="160" class="sub" fill="#58A6FF">I code, therefore I must code.</text>

  <text x="52" y="204" class="cmd" fill="#9fb6ff">$ mode --set hacky flashy geeky</text>
  <text x="52" y="232" class="cmd" fill="#8be9fd">$ shell --prefer fish</text>
  <text x="52" y="260" class="cmd" fill="#b892ff">$ build --status shipping</text>
  <text id="cursor" x="474" y="260" class="cmd" fill="#58A6FF">_</text>
  <animate href="#cursor" attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>

  <g transform="translate(760 86)">
    <rect x="0" y="0" width="360" height="180" rx="12" fill="#0e1326" stroke="#2d3560"/>
    <text x="20" y="34" class="cmd" fill="#58A6FF">core stack</text>
    <text x="20" y="64" class="cmd" fill="#c3d7ff">python  fastapi  docker</text>
    <text x="20" y="92" class="cmd" fill="#c3d7ff">transformers  mamba/ssm</text>
    <text x="20" y="120" class="cmd" fill="#c3d7ff">linux  fish  neo4j</text>
    <text x="20" y="154" class="cmd" fill="#8b95c9">status: alive</text>
  </g>
</svg>
